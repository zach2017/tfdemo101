# ==============================================================================
# GitHub Actions: Terraform Static Analysis & Security Scanning
# ==============================================================================
# Runs on every PR. Catches misconfigurations (open security groups, unencrypted
# resources, etc.) and linting issues BEFORE they reach the plan/apply pipeline.
# These tools are advisory guardrails; tune their rules as your standards evolve.
# ==============================================================================

name: Terraform Lint & Security

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/lint.yml"

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # tflint catches provider-specific mistakes and enforces naming/style rules.
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run TFLint
        run: |
          tflint --init
          tflint --recursive

      # Trivy scans IaC for security and misconfiguration issues. exit-code 1
      # makes a finding fail the PR; set to 0 while you triage initial findings.
      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: terraform/
          severity: HIGH,CRITICAL
          exit-code: "1"
